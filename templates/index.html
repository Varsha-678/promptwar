<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Buddy AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Hero Section -->
        <header class="hero">
            <h1>Event Buddy AI <span class="sparkle">✨</span></h1>
            <p>Your smart guide for the physical event experience.</p>
        </header>

        <!-- Main Layout -->
        <main class="main-content">
            <!-- Left Column: Info Cards -->
            <section class="info-section">
                <h2>Quick Info</h2>
                <div id="info-cards-container" class="cards-grid">
                    <!-- Cards injected via JS -->
                    <div class="loading-state">Loading event data...</div>
                </div>
            </section>

            <!-- Right Column: Chat Interface -->
            <section class="chat-section">
                <div class="chat-window">
                    <div id="chat-messages" class="messages-container">
                        <div class="message ai-message">
                            <p>Hi! I'm Event Buddy. Need to find a hall, grab some food, or find a session?</p>
                        </div>
                    </div>
                    
                    <div class="sample-questions" id="sample-questions">
                        <!-- Chips injected via JS -->
                    </div>

                    <form id="chat-form" class="input-area">
                        <input type="text" id="user-input" placeholder="Ask me anything about the event..." autocomplete="off" aria-label="Chat input">
                        <button type="submit" aria-label="Send message">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </form>
                </div>
            </section>
        </main>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
